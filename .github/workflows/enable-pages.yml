name: 启用 GitHub Pages (从 main 分支)

on:
  push:
    paths:
      - '.github/workflows/enable-pages.yml'

permissions:
  contents: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: 调用 API 启用 Pages
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"main","path":"/"}}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
      - name: 删除此工作流文件 (避免重复运行)
        run: |
          rm .github/workflows/enable-pages.yml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .github/workflows/enable-pages.yml
          git commit -m "Pages 已启用，删除临时工作流"
          git push
