name: 启用 GitHub Pages

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: 调用 API 启用 Pages
        run: |
          set -e
          # 先检查 Pages 状态
          STATUS=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages)
          HTTP_CODE=$(echo "$STATUS" | tail -1)
          echo "当前 Pages 状态 HTTP: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Pages 已启用！无需操作。"
            exit 0
          fi
          
          # 启用 Pages
          echo "正在启用 Pages..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"main","path":"/"}}')
          HTTP_CODE2=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP_CODE2"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE2" = "201" ] || [ "$HTTP_CODE2" = "200" ]; then
            echo "✅ Pages 启用成功！"
          else
            echo "❌ 启用失败，HTTP: $HTTP_CODE2"
            exit 1
          fi
